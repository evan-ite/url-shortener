apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-shortener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: url-shortener
  template:
    metadata:
      labels:
        app: url-shortener
    spec:
      containers:
        - name: url-shortener
          image: url-shortener:latest
          imagePullPolicy: Never # use local image
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: postgres-connection-string
            - name: ConnectionStrings__Redis
              value: "redis-service:6379"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
